# ─── 기본 설정 ───────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename off
setw -g allow-rename off
set -g escape-time 0
set -g mouse on
bind-key -n C-g set-option -g mouse \; display-message "Mouse: #{?mouse,ON,OFF}"

# ─── Copy mode ──────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ─── Status bar ──────────────────────────────────────────
set -g status-position bottom
set -g status-style "fg=#b0aea5,bg=#141413"

# session  folder  branch
# branch (#W) is updated via zsh precmd hook in xmux.zsh — no polling needed
set -g status-left-length 80
set -g status-left "#[fg=#141413,bg=#d97757,bold] #S #[fg=#d97757,bg=#2a2928,nobold]#[fg=#faf9f5,bg=#2a2928] #{b:pane_current_path} #[fg=#2a2928,bg=#141413]#[fg=#6e6c68] #W  "

# @xmux_model: set by background monitor in xmux.zsh (zero-overhead read)
# window_activity: tmux built-in last-output timestamp (zero overhead)
set -g status-right-length 45
set -g status-right "#[fg=#6e6c68]#{@xmux_model}  #[fg=#4a4845]↑#{t/f/%H:window_activity}:#{t/f/%M:window_activity}  %m/%d  #[fg=#b0aea5,bold]%H:%M "

# ─── Window tabs ─────────────────────────────────────────
# xmux enforces 1 window per session, but tmux shows tabs by default.
# explicitly clear formats to suppress the window index from appearing.
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""

# ─── Pane border ─────────────────────────────────────────
set -g pane-border-style "fg=#2a2928"
set -g pane-active-border-style "fg=#d97757"

# ─── Message / Command prompt ────────────────────────────
set -g message-style "fg=#141413,bg=#d97757,bold"
set -g message-command-style "fg=#faf9f5,bg=#2a2928"

# ─── Root table: disable dangerous / useless bindings ────
# [REMOVE: REQUIRED] Right-click context menus that offer split-window / kill-pane.
# Any of these can silently break the 1-window / 1-pane contract.
unbind-key -T root MouseDown3Pane
unbind-key -T root MouseDown3Status
unbind-key -T root MouseDown3StatusLeft
unbind-key -T root M-MouseDown3Pane
unbind-key -T root M-MouseDown3Status
unbind-key -T root M-MouseDown3StatusLeft

# [REMOVE: RECOMMENDED] Bindings that are meaningless in a 1-window / 1-pane setup.
# WheelUp/DownStatus: previous-window / next-window — only 1 window exists.
# MouseDown1Status:   switch-client — session switching is handled by xmux, not the status bar.
# MouseDrag1Border:   resize-pane — no pane border exists with a single pane.
unbind-key -T root WheelUpStatus
unbind-key -T root WheelDownStatus
unbind-key -T root MouseDown1Status
unbind-key -T root MouseDrag1Border

# ─── Prefix table: disable dangerous / useless bindings ──
# [REMOVE: REQUIRED] Structure-breaking bindings.
# These can silently destroy the 1-window / 1-pane contract.
unbind-key -T prefix '"'      # split-window (vertical split)
unbind-key -T prefix '%'      # split-window -h (horizontal split)
unbind-key -T prefix 'c'      # new-window
unbind-key -T prefix 'x'      # kill-pane
unbind-key -T prefix '&'      # kill-window
unbind-key -T prefix '!'      # break-pane (detach pane into new window)
unbind-key -T prefix 'C-z'    # suspend-client

# [REMOVE: RECOMMENDED] Window navigation — only 1 window exists.
unbind-key -T prefix '0'      # select-window -t :=0
unbind-key -T prefix '1'      # select-window -t :=1
unbind-key -T prefix '2'      # select-window -t :=2
unbind-key -T prefix '3'      # select-window -t :=3
unbind-key -T prefix '4'      # select-window -t :=4
unbind-key -T prefix '5'      # select-window -t :=5
unbind-key -T prefix '6'      # select-window -t :=6
unbind-key -T prefix '7'      # select-window -t :=7
unbind-key -T prefix '8'      # select-window -t :=8
unbind-key -T prefix '9'      # select-window -t :=9
unbind-key -T prefix 'n'      # next-window
unbind-key -T prefix 'p'      # previous-window
unbind-key -T prefix 'l'      # last-window
unbind-key -T prefix "'"      # select-window by index prompt
unbind-key -T prefix '.'      # move-window prompt
unbind-key -T prefix 'f'      # find-window
unbind-key -T prefix 'w'      # choose-tree -Zw
unbind-key -T prefix 'M-n'    # next-window -a
unbind-key -T prefix 'M-p'    # previous-window -a

# [REMOVE: RECOMMENDED] Pane navigation / manipulation — only 1 pane exists.
unbind-key -T prefix 'o'      # select-pane -t :.+
unbind-key -T prefix ';'      # last-pane
unbind-key -T prefix 'q'      # display-panes
unbind-key -T prefix 'm'      # select-pane -m (mark)
unbind-key -T prefix 'M'      # select-pane -M (unmark)
unbind-key -T prefix '{'      # swap-pane -U
unbind-key -T prefix '}'      # swap-pane -D
unbind-key -T prefix 'C-o'    # rotate-window
unbind-key -T prefix 'M-o'    # rotate-window -D

# [REMOVE: RECOMMENDED] Layout presets — meaningless with 1 pane.
unbind-key -T prefix 'Space'  # next-layout
unbind-key -T prefix 'E'      # select-layout -E
unbind-key -T prefix 'M-1'    # select-layout even-horizontal
unbind-key -T prefix 'M-2'    # select-layout even-vertical
unbind-key -T prefix 'M-3'    # select-layout main-horizontal
unbind-key -T prefix 'M-4'    # select-layout main-vertical
unbind-key -T prefix 'M-5'    # select-layout tiled
unbind-key -T prefix 'M-6'    # select-layout main-horizontal-mirrored
unbind-key -T prefix 'M-7'    # select-layout main-vertical-mirrored

# [REMOVE: RECOMMENDED] Pane resize — meaningless with 1 pane.
unbind-key -T prefix 'Up'     # select-pane -U
unbind-key -T prefix 'Down'   # select-pane -D
unbind-key -T prefix 'Left'   # select-pane -L
unbind-key -T prefix 'Right'  # select-pane -R
unbind-key -T prefix 'M-Up'   # resize-pane -U 5
unbind-key -T prefix 'M-Down' # resize-pane -D 5
unbind-key -T prefix 'M-Left' # resize-pane -L 5
unbind-key -T prefix 'M-Right'# resize-pane -R 5
unbind-key -T prefix 'C-Up'   # resize-pane -U
unbind-key -T prefix 'C-Down' # resize-pane -D
unbind-key -T prefix 'C-Left' # resize-pane -L
unbind-key -T prefix 'C-Right'# resize-pane -R
unbind-key -T prefix 'z'      # resize-pane -Z (zoom toggle)

# [REMOVE: RECOMMENDED] Session switching — xmux manages sessions; direct
# client-side switching bypasses xmux's attach/detach lifecycle.
unbind-key -T prefix '('      # switch-client -p
unbind-key -T prefix ')'      # switch-client -n
unbind-key -T prefix 'L'      # switch-client -l
unbind-key -T prefix 'D'      # choose-client -Z

# [REMOVE: RECOMMENDED] Context menus containing split/kill actions,
# and other bindings that add no value in this setup.
unbind-key -T prefix '<'      # display-menu (window context menu)
unbind-key -T prefix '>'      # display-menu (pane context menu)
unbind-key -T prefix 't'      # clock-mode (status bar shows time)
unbind-key -T prefix 'DC'     # refresh-client -c
unbind-key -T prefix 'S-Up'   # refresh-client -U 10
unbind-key -T prefix 'S-Down' # refresh-client -D 10
unbind-key -T prefix 'S-Left' # refresh-client -L 10
unbind-key -T prefix 'S-Right'# refresh-client -R 10
