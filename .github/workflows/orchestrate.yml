name: ci

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - 'tests/**'
      - 'settings.json'
      - '.github/workflows/orchestrate.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - 'tests/**'
      - 'settings.json'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tmux + zsh (for integration tests)
        run: sudo apt-get update && sudo apt-get install -y tmux zsh
      - name: Configure CI zsh (skip system rc traps)
        run: |
          echo 'setopt NO_GLOBAL_RCS' > ~/.zshenv
          touch ~/.zshrc
      - name: Install pytest
        run: python3 -m pip install --upgrade pip pytest
      - name: Unit tests (all)
        run: python3 -m pytest tests/ -v
