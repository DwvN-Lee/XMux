# XMux 2.x tmux defaults.
#
# tmux hosts the Codex and Claude TUI panes only. Prompt transport is handled by
# the XMux PTY harness, not by tmux paste/send-key commands.

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename off
setw -g allow-rename off
set -g escape-time 0
set -g mouse on
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features "xterm*:extkeys"

set -g status-position bottom
set -g status-style "fg=#F5F7FA,bg=#0E0F12"
set -g status-left-length 80
set -g status-left "#[fg=#0E0F12,bg=#10A37F,bold] XMux #[fg=#F5F7FA,bg=#252A31,nobold] #S #[fg=#9EA1AA,bg=#15171C] #W "
set -g status-right-length 45
set -g status-right "#[fg=#9EA1AA,bg=#15171C] xmux #{@xmux-version} #[fg=#F5F7FA,bg=#252A31] %H:%M "

set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""
setw -g window-style default
setw -g window-active-style default

set -g pane-border-style "fg=#15171C"
set -g pane-border-status top
set -g pane-border-format " #{?#{||:#{==:#{@xmux-provider},claude},#{m:claude:*,#{@xmux-agent}}},#{?#{@xmux-claude-progress},#{@xmux-claude-progress} ,✳ },#{?#{m/r:^[⠋⠙⠹⠸⠼⠴⠦⠧⠇⠏],#{pane_title}},#{=1:pane_title} ,}}#{?#{||:#{==:#{@xmux-provider},claude},#{m:claude:*,#{@xmux-agent}}},#[fg=#D97757]#[bold]claude #[default],#[fg=#10A37F]#[bold]codex #[default]}"
set -g pane-active-border-style "fg=#10A37F,bold"
set -g message-style "fg=#0E0F12,bg=#10A37F,bold"
set -g message-command-style "fg=#F5F7FA,bg=#252A31"
setw -g mode-style "bg=#10A37F,fg=#0E0F12"

bind-key -T root MouseDown1Pane if-shell -F -t = "#{||:#{==:#{@xmux-provider},claude},#{m:claude:*,#{@xmux-agent}}}" "select-pane -t = ; set-window-option -t = mode-style bg=#D97757,fg=#0E0F12 ; set-option -t = pane-active-border-style fg=#D97757,bold ; send-keys -M" "select-pane -t = ; set-window-option -t = mode-style bg=#10A37F,fg=#0E0F12 ; set-option -t = pane-active-border-style fg=#10A37F,bold ; send-keys -M"
bind-key -T root MouseDrag1Pane if-shell -F -t = "#{||:#{==:#{@xmux-provider},claude},#{m:claude:*,#{@xmux-agent}}}" "select-pane -t = ; set-window-option -t = mode-style bg=#D97757,fg=#0E0F12 ; set-option -t = pane-active-border-style fg=#D97757,bold ; copy-mode -M" "select-pane -t = ; set-window-option -t = mode-style bg=#10A37F,fg=#0E0F12 ; set-option -t = pane-active-border-style fg=#10A37F,bold ; copy-mode -M"
bind-key -T copy-mode MouseDown1Pane if-shell -F -t = "#{||:#{==:#{@xmux-provider},claude},#{m:claude:*,#{@xmux-agent}}}" "select-pane -t = ; set-window-option -t = mode-style bg=#D97757,fg=#0E0F12 ; set-option -t = pane-active-border-style fg=#D97757,bold" "select-pane -t = ; set-window-option -t = mode-style bg=#10A37F,fg=#0E0F12 ; set-option -t = pane-active-border-style fg=#10A37F,bold"
bind-key -T copy-mode MouseDrag1Pane if-shell -F -t = "1" "select-pane -t = ; send-keys -X begin-selection"
bind-key -T copy-mode-vi MouseDown1Pane if-shell -F -t = "#{||:#{==:#{@xmux-provider},claude},#{m:claude:*,#{@xmux-agent}}}" "select-pane -t = ; set-window-option -t = mode-style bg=#D97757,fg=#0E0F12 ; set-option -t = pane-active-border-style fg=#D97757,bold" "select-pane -t = ; set-window-option -t = mode-style bg=#10A37F,fg=#0E0F12 ; set-option -t = pane-active-border-style fg=#10A37F,bold"
bind-key -T copy-mode-vi MouseDrag1Pane if-shell -F -t = "1" "select-pane -t = ; send-keys -X begin-selection"
