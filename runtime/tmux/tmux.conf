# XMux 2.x tmux defaults.
#
# tmux hosts the Codex and Claude TUI panes only. Prompt transport is handled by
# the XMux PTY harness, not by tmux paste/send-key commands.

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename off
setw -g allow-rename off
set -g escape-time 0
set -g mouse on

set -g status-position bottom
set -g status-style "fg=#F5F7FA,bg=#0E0F12"
set -g status-left-length 80
set -g status-left "#[fg=#0E0F12,bg=#10A37F,bold] XMux #[fg=#F5F7FA,bg=#252A31,nobold] #S #[fg=#9EA1AA,bg=#15171C] #W "
set -g status-right-length 45
set -g status-right "#[fg=#9EA1AA,bg=#15171C] xmux #{@xmux-version} #[fg=#F5F7FA,bg=#252A31] %H:%M "

set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""
setw -g window-style "fg=#F5F7FA,bg=#0E0F12"
setw -g window-active-style "fg=#F5F7FA,bg=#0E0F12"

set -g pane-border-style "fg=#15171C"
set -g pane-active-border-style "fg=#10A37F,bold"
set -g message-style "fg=#0E0F12,bg=#10A37F,bold"
set -g message-command-style "fg=#F5F7FA,bg=#252A31"
